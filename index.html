<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Boca de Urna Santaní | Radio Ñasaindy 620AM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <style>
        .admin-panel, .digitador-panel { display: none; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    </style>
</head>
<body>
<div class="container">
    <div class="radio-header">
        <div class="brand">
            <h1><img src="assets/logo_nasa.png" alt="Logo" class="logo-radio" onerror="this.src='https://via.placeholder.com/60?text=Logo'"> Radio Ñasaindy 620 AM</h1>
            <p>Elecciones Municipales 2026 · San Estanislao</p>
        </div>
        <div class="election-badge"><i class="fas fa-vote-yea"></i> BOCA DE URNA OFICIAL</div>
    </div>
    <div id="adminPanel" class="admin-panel"></div>
    <div id="digitadorPanel" class="digitador-panel"></div>
    <div class="footer-note">Sistema Boca de Urna – Radio Ñasaindy 620AM – Elecciones Municipales San Estanislao 2026</div>
</div>

<button id="floatingLoginBtn" class="floating-login"><i class="fas fa-user-lock"></i> Acceder</button>
<div id="loadingOverlay"><div style="background:white; padding:2rem; border-radius:1rem; color:#1a2e2a;">Cargando datos...</div></div>

<script type="module" src="app.js"></script>
<script>
    // Fallback para ocultar overlay si algo falla
    setTimeout(function() {
        var overlay = document.getElementById('loadingOverlay');
        if (overlay) overlay.style.display = 'none';
    }, 5000);
</script>
</body>
</html>
